const orderedColumns = ['School', 'State', 'A', 'B', 'C', 'D', 'Unkown', 'Ungraded', 'Total%', 'average score', 'weighted sum', 'redlining severity', 'grade diversity', 'diversity score', 'HS Diploma (%)', 'Gini Index', 'Median HH Income', 'Predominant Racial Group'];

function formatCell(column, value) {
  if (value === null || value === undefined || value === '') return '';
  if (numberColumns.has(column)) {
    const num = Number(value);

    if (column === 'Median HH Income') return `$${num.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;

    if (column === 'grade diversity') return num.toFixed(0);

    }

  }
}
