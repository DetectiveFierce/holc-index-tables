<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=./table/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1220">
  <title>Redirecting to Table View</title>
  <link rel="stylesheet" href="map/vendor/fonts/inter.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f6f4ff;
      background:
        radial-gradient(900px 500px at 8% -5%, rgba(194, 107, 255, 0.22), transparent 66%),
        radial-gradient(780px 460px at 96% -10%, rgba(132, 72, 196, 0.14), transparent 70%),
        linear-gradient(175deg, #0b0d15, #07070d);
    }

    .card {
      width: min(480px, calc(100% - 32px));
      padding: 28px;
      border: 1px solid #2e3755;
      border-radius: 18px;
      background: rgba(17, 21, 38, 0.9);
      text-align: center;
    }

    a {
      color: #d9a0ff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <p>Redirecting to the table view.</p>
    <p><a href="./table/">Continue if the redirect does not happen automatically.</a></p>
  </div>
</body>
</html>
